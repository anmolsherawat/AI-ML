services:
  - type: web
    name: agrivision-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDir: .
    plan: free
    envVars:
      - key: GROQ_API_KEY
        sync: false
